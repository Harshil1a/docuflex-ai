services:
  - type: web
    name: docuflex-ai
    runtime: docker
    plan: free
    region: singapore # Choose the region closest to you
    envVars:
      - key: MONGODB_URI
        sync: false # You will need to set this in the Render dashboard
      - key: GROQ_API_KEY
        sync: false
      - key: ADMIN_REGISTRATION_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: STORAGE_MODE
        value: s3
      - key: AWS_S3_BUCKET
        sync: false
      - key: AWS_REGION
        value: ap-south-1
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: DOCUFLEX_STORAGE
        value: uploads
      - key: ALLOWED_ORIGINS
        value: "*" # We can tighten this once we have the Render URL
